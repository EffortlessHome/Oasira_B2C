blueprint:
  name: Camera Motion
  description:
    This automation blueprint creates a camera snapshot if motion is detected,
    or if a binary sensor's state turns 'off' to 'on', and sends a notification to
    your phone with the picture. Clicking the navigation will navigate to dashboard
    URL.
  domain: automation
  author: Oasira
  input:
    sensor:
      name: Motion or Binary Sensor
      description: The sensor wich triggers the snapshot creation
      selector:
        entity:
          domain:
            - binary_sensor
          multiple: false
    camera:
      name: Camera
      description: The camera which creates the snapshot
      selector:
        entity:
          domain:
            - camera
          multiple: false

    notification_title:
      name: Notification title
      description: 'Default: "Motion detected!"'
      default: Motion detected!
    notification_message:
      name: Notification message
      description:
        'Default: "{{ sensor_name }} detected movement! Snapshot from {{
        camera_name }} at {{ time }}."'
      default:
        "{{ sensor_name }} detected movement! Snapshot from {{ camera_name
        }} at {{ time }}."

    additional_actions:
      name: Additional Actions
      description: Add additional actions to execute (Optional)
        else.
      default: []
      selector:
        action: {}

trigger:
  - platform: state
    entity_id: !input sensor
    to: "on"

variables:
  sensor: !input sensor
  sensor_name: "{{ states[sensor].name }}"

  camera: !input camera
  camera_name: "{{ states[camera].name }}"

  time: '{{ now().strftime("%H:%M") }}'
  date: '{{ now().strftime("%Y-%m-%d") }}'

  notification_title: !input notification_title
  notification_message: !input notification_message

  snapshot_access_file_path: /config/www/oasira/{{ camera_name }}/{{ date }} {{ time }}.jpg
  snapshot_access_file_path_local:
    "{{ snapshot_access_file_path | replace('/config/www','/local')
    }}"

  clip_access_file_path: /config/www/oasira/{{ camera_name }}/{{ date }} {{ time }}.mp4

  timelineentry: "{{ notification_title }} [{{ snapshot_access_file_path_local }}][{{ clip_access_>

  additional_actions: !input additional_actions

action:

  - service: camera.snapshot
    entity_id: !input camera
    data:
      filename: "{{ snapshot_access_file_path }}"

  - service: camera.record
    entity_id: !input camera
    data:
      filename: "{{ clip_access_file_path }}"
      duration: 5
      
  - condition: state
    entity_id: switch.motion_notifications
    state: "on"

  - service: notify.oasira
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        image: "{{ snapshot_access_file_path_local }}"

  - service: oasira_b2c.create_timeline_event
    data:
      entity_id: !input camera
      entity_name: "{{ camera_name }}"
      event_type: "{{ timelineentry }}"

  - choose: []
    default: !input additional_actions
mode: parallel