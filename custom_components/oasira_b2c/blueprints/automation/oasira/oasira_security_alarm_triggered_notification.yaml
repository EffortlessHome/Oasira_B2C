blueprint:
  name: Security Alarm Triggered Notification
  description: Set the actions to take when the security alarm is triggered.
  domain: automation
  author: Oasira
  input:

    notification_message:
      name: Notification message
      description: The notification message to send when the Security Alarm has been triggered.
      default: Security Alarm has been triggered.
    timeout_seconds:
      name: Timeout in seconds
      description: Time after which the confirm action will be automatically triggered if no response is received
      default: 300
      selector:
        number:
          min: 100
          max: 600
          unit_of_measurement: seconds
    additional_actions:
      name: Additional Actions
      description: Add additional actions to execute (Optional)
      default: []
      selector:
        action: {}
trigger:
  - platform: state
    entity_id: alarm_control_panel.Oasira
    to: "triggered"
action:
  - service: notify.oasira
    continue_on_error: true
    data:
      message: !input notification_message
      title: "Security Alarm Triggered"
  - alias: Awaiting response
    continue_on_error: true
    wait_for_trigger:
      - platform: state
        entity_id: alarm_control_panel.Oasira
        from: "pending"
        to: "active"
    timeout:
      seconds: !input timeout_seconds
  - choose:
      - conditions: "{{ wait.trigger is not none }}"
        sequence:
          - action: oasira_b2c.confirmpendingalarmservice
            continue_on_error: true
            data: {}

    default: # If timeout occurs
      - sequence:
          - action: oasira_b2c.confirmpendingalarmservice
            data: {}

  - choose: []
    continue_on_error: true
    default: !input additional_actions
