blueprint:
  name: Timeline Activity Recording
  description:
    Creates timeline events with snapshots and video clips when motion or
    person detection is triggered. Phase 1 captures person detection with
    snapshot and short video clip. Phase 2 (future) will analyze and categorize.
  domain: automation
  author: Oasira
  input:
    camera:
      name: Camera
      description: The camera to capture from
      selector:
        entity:
          domain:
            - camera
          multiple: false

    trigger_sensor:
      name: Motion/Binary Sensor
      description: Sensor that triggers the recording (motion sensor, person detection, etc.)
      selector:
        entity:
          domain:
            - binary_sensor
          multiple: false

    capture_snapshot:
      name: Capture Snapshot
      description: Capture a snapshot when triggered
      default: true
      selector:
        boolean:

    record_video:
      name: Record Video Clip
      description: Record a short video clip when triggered
      default: true
      selector:
        boolean:

    video_duration:
      name: Video Duration
      description: Length of video clip in seconds
      default: 5
      selector:
        number:
          min: 1
          max: 30
          unit_of_measurement: seconds

    save_to_timeline:
      name: Save to Timeline
      description: Save events to timeline for later review
      default: true
      selector:
        boolean:

    event_type:
      name: Event Type
      description: Type of event for timeline
      default: person_detected
      selector:
        select:
          options:
            - person_detected
            - motion
            - vehicle
            - animal
            - package

    notify_on_capture:
      name: Send Notification
      description: Send a notification when activity is captured
      default: false
      selector:
        boolean:

    notification_title:
      name: Notification Title
      description: Title for the notification
      default: "Activity Detected"

    notification_message:
      name: Notification Message
      description: Message for the notification
      default: "{{ trigger_sensor.name }} detected activity on {{ camera.name }}"

trigger:
  - platform: state
    entity_id: !input trigger_sensor
    to: "on"

variables:
  camera: !input camera
  camera_name: "{{ states[camera].name if states[camera] else camera }}"

  trigger_sensor: !input trigger_sensor
  trigger_name: "{{ states[trigger_sensor].name if states[trigger_sensor] else trigger_sensor }}"

  capture_snapshot: !input capture_snapshot
  record_video: !input record_video
  video_duration: !input video_duration
  save_to_timeline: !input save_to_timeline
  event_type: !input event_type

  notify_on_capture: !input notify_on_capture
  notification_title: !input notification_title
  notification_message: !input notification_message

  timeline_event_id: ""

action:
  - choose:
      # Capture snapshot if enabled
      - conditions:
          - condition: template
            value_template: "{{ capture_snapshot }}"
        sequence:
          - service: oasira_b2c.capture_snapshot
            target:
              entity_id: !input camera
            data:
              save_to_timeline: "{{ save_to_timeline }}"
              event_type: "{{ event_type }}"
              description: "{{ trigger_name }} detected by {{ camera_name }}"
              labels: ["{{ event_type }}"]

      # Record video clip if enabled
      - conditions:
          - condition: template
            value_template: "{{ record_video }}"
        sequence:
          - service: oasira_b2c.record_video_clip
            target:
              entity_id: !input camera
            data:
              duration: "{{ video_duration }}"
              save_to_timeline: "{{ save_to_timeline }}"
              event_type: "{{ event_type }}"
              description: "{{ trigger_name }} motion on {{ camera_name }}"

    # Default: create person event if neither snapshot nor video specifically enabled
    default:
      - service: oasira_b2c.create_person_event
        target:
          entity_id: !input camera
        data:
          camera_name: "{{ camera_name }}"
          save_to_timeline: "{{ save_to_timeline }}"
          event_type: "{{ event_type }}"
          description: "{{ trigger_name }} activity on {{ camera_name }}"
          labels: ["{{ event_type }}"]

  # Send notification if enabled
  - condition: state
    entity_id: switch.motion_notifications
    state: "on"

  - condition: template
    value_template: "{{ notify_on_capture }}"

  - service: notify.Oasira
    data:
      title: "{{ notification_title }}"
      message: "{{ notification_message }}"
      data:
        attachment:
          url: "/media/timeline/{{ camera_name | replace(' ', '_') }}/"

mode: parallel
max_exceeded: silent